<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <style>
    body {
      background: linear-gradient(135deg, #2d3748 0%, #1a202c 100%);
      color: #f7fafc;
      min-height: 100vh;
    }
    .upload-container {
      background: rgba(45, 55, 72, 0.6);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      padding: 12px 40px;
      font-size: 1.1rem;
      border-radius: 50px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      color: white;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
    }
    .file-upload-wrapper {
      border: 2px dashed rgba(102, 126, 234, 0.7);
      border-radius: 15px;
      padding: 40px;
      transition: all 0.3s ease;
    }
    .file-upload-wrapper:hover {
      border-color: #667eea;
      background: rgba(102, 126, 234, 0.08);
    }
    .text-muted {
      color: #cbd5e0 !important;
    }
    .result-card {
      background: rgba(45, 55, 72, 0.6);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.15);
    }
  </style>
  <title>Skin Cancer Detection | CNN</title>
</head>
<body>
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-8 col-md-10">
        <div class="text-center mb-5">
          <h1 class="display-4 fw-bold mb-3">Skin Cancer Detection</h1>
          <p class="lead text-muted">Using Convolutional Neural Network</p>
        </div>

        <div class="upload-container p-5">
          <h3 class="text-center mb-4">Select an Image</h3>
          <form method="POST" enctype="multipart/form-data" action="/showresult">
            <div class="mb-4">
              <div class="file-upload-wrapper text-center">
                <input type="file" name="pic" id="pic" class="form-control" accept="image/*" multiple required>
                <label for="pic" class="form-label mt-3">Click to upload or drag and drop</label>
                <p class="text-muted small">Supports JPG, PNG</p>
              </div>
            </div>
            <div class="text-center">
              <button type="submit" class="btn btn-primary">Analyze Image</button>
            </div>
          </form>
        </div>

        <div id="history-section" class="mt-5" style="display: none;">
          <div class="result-card p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
              <h4>Prediction History</h4>
              <button class="btn btn-sm btn-outline-light" id="clear-history">Clear History</button>
            </div>
            <div id="history-list"></div>
          </div>
        </div>

        <div class="text-center mt-5">
          <a href="https://charanhu.medium.com/skin-cancer-detection-using-convolution-neural-network-cnn-b9c1fb5bb492" class="text-decoration-none text-muted me-4" target="_blank">
            <small>Learn More</small>
          </a>
          <a href="https://github.com/charanhu/Skin-Cancer-Detection-MNIST" class="text-decoration-none text-muted" target="_blank">
            <small>GitHub</small>
          </a>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Load and display prediction history
    document.addEventListener('DOMContentLoaded', function() {
      const historySection = document.getElementById('history-section');
      const historyList = document.getElementById('history-list');
      const clearHistoryBtn = document.getElementById('clear-history');

      // Load history from localStorage
      const history = JSON.parse(localStorage.getItem('skinCancerHistory') || '[]');

      if (history.length > 0) {
        historySection.style.display = 'block';
        
        history.reverse().forEach((item, index) => {
          const card = document.createElement('div');
          card.className = 'mb-3 p-3 rounded';
          card.style.background = 'rgba(255,255,255,0.03)';
          card.style.border = '1px solid rgba(255,255,255,0.1)';
          
          card.innerHTML = `
            <div class="d-flex justify-content-between align-items-start">
              <div>
                <h6 class="mb-1">${item.result}</h6>
                <small class="text-muted">Confidence: ${item.max_prob}%</small>
                <br>
                <small class="text-muted">${new Date(item.date).toLocaleString()}</small>
              </div>
            </div>
          `;
          
          historyList.appendChild(card);
        });
      }

      // Clear history button
      clearHistoryBtn.addEventListener('click', function() {
        localStorage.removeItem('skinCancerHistory');
        historySection.style.display = 'none';
        historyList.innerHTML = '';
      });
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
